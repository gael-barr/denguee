<svg viewBox="0 0 560 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Silueta humana señalando los signos de alarma del dengue: dolor abdominal, vómito persistente, sangrado de mucosas y decaimiento">
  <!-- Silueta central -->
  <g transform="translate(280,165)">
    <circle cx="0" cy="-95" r="26" fill="#0B3D3A"/>
    <path d="M-38 30 Q-38 -55 0 -55 Q38 -55 38 30 L34 95 Q34 105 24 105 L-24 105 Q-34 105 -34 95 Z" fill="#0B3D3A"/>
  </g>

  <!-- Etiqueta 1: dolor abdominal -->
  <g>
    <line x1="252" y1="190" x2="150" y2="190" stroke="#E8483C" stroke-width="2"/>
    <circle cx="252" cy="190" r="4.5" fill="#E8483C"/>
    <rect x="20" y="168" width="130" height="44" rx="10" fill="#FFFFFF" stroke="#E8483C" stroke-width="1.5"/>
    <text x="85" y="186" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#C73327">Dolor abdominal</text>
    <text x="85" y="202" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#C73327">intenso y continuo</text>
  </g>

  <!-- Etiqueta 2: vómito persistente -->
  <g>
    <line x1="300" y1="95" x2="430" y2="55" stroke="#E8483C" stroke-width="2"/>
    <circle cx="300" cy="95" r="4.5" fill="#E8483C"/>
    <rect x="410" y="20" width="140" height="44" rx="10" fill="#FFFFFF" stroke="#E8483C" stroke-width="1.5"/>
    <text x="480" y="38" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#C73327">Vómito persistente</text>
    <text x="480" y="54" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#C73327">(3 o más veces/hora)</text>
  </g>

  <!-- Etiqueta 3: sangrado de mucosas -->
  <g>
    <line x1="308" y1="125" x2="430" y2="125" stroke="#E8483C" stroke-width="2"/>
    <circle cx="308" cy="125" r="4.5" fill="#E8483C"/>
    <rect x="410" y="103" width="140" height="44" rx="10" fill="#FFFFFF" stroke="#E8483C" stroke-width="1.5"/>
    <text x="480" y="121" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#C73327">Sangrado de nariz,</text>
    <text x="480" y="137" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#C73327">encías o en orina</text>
  </g>

  <!-- Etiqueta 4: decaimiento / somnolencia -->
  <g>
    <line x1="252" y1="100" x2="150" y2="80" stroke="#E8483C" stroke-width="2"/>
    <circle cx="252" cy="100" r="4.5" fill="#E8483C"/>
    <rect x="10" y="48" width="140" height="44" rx="10" fill="#FFFFFF" stroke="#E8483C" stroke-width="1.5"/>
    <text x="80" y="66" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#C73327">Decaimiento extremo</text>
    <text x="80" y="82" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#C73327">o irritabilidad</text>
  </g>

  <!-- Etiqueta 5: piel fría/pálida -->
  <g>
    <line x1="312" y1="225" x2="430" y2="245" stroke="#E8483C" stroke-width="2"/>
    <circle cx="312" cy="225" r="4.5" fill="#E8483C"/>
    <rect x="410" y="223" width="140" height="44" rx="10" fill="#FFFFFF" stroke="#E8483C" stroke-width="1.5"/>
    <text x="480" y="241" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#C73327">Piel pálida, fría</text>
    <text x="480" y="257" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#C73327">y húmeda</text>
  </g>

  <!-- Etiqueta 6: dificultad respiratoria -->
  <g>
    <line x1="250" y1="240" x2="150" y2="260" stroke="#E8483C" stroke-width="2"/>
    <circle cx="250" cy="240" r="4.5" fill="#E8483C"/>
    <rect x="10" y="238" width="140" height="44" rx="10" fill="#FFFFFF" stroke="#E8483C" stroke-width="1.5"/>
    <text x="80" y="256" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#C73327">Dificultad para</text>
    <text x="80" y="272" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#C73327">respirar</text>
  </g>
</svg>
