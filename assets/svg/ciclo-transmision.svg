<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ciclo de transmisión del dengue entre el mosquito Aedes aegypti y las personas">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#E8483C"/>
    </marker>
  </defs>

  <text x="400" y="36" text-anchor="middle" font-family="Fraunces, serif" font-size="24" font-weight="600" fill="#0B3D3A">Ciclo de transmisión del dengue</text>

  <circle cx="400" cy="265" r="155" fill="none" stroke="#0B3D3A" stroke-width="2" stroke-dasharray="2 10" opacity="0.22"/>

  <g fill="none" stroke="#E8483C" stroke-width="3" stroke-linecap="round">
    <path d="M 545 185 A 155 155 0 0 1 545 345" marker-end="url(#arrow)"/>
    <path d="M 255 345 A 155 155 0 0 1 255 185" marker-end="url(#arrow)"/>
  </g>

  <g transform="translate(155,265)">
    <circle r="62" fill="#FFFFFF" stroke="#0B3D3A" stroke-width="2"/>
    <circle cx="0" cy="-16" r="15" fill="#2D7A6E"/>
    <path d="M-22 28 Q0 -4 22 28 Z" fill="#2D7A6E"/>
    <text x="0" y="86" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0B3D3A">Persona sana</text>
  </g>

  <g transform="translate(400,108)">
    <circle r="62" fill="#FFFFFF" stroke="#E8483C" stroke-width="2"/>
    <g transform="translate(-30,-34) scale(0.155)">
      <ellipse cx="200" cy="215" rx="38" ry="48" fill="#0B3D3A"/>
      <path d="M178 250 Q200 320 222 250 Q222 220 200 215 Q178 220 178 250 Z" fill="#0B3D3A"/>
      <circle cx="200" cy="170" r="24" fill="#0B3D3A"/>
      <circle cx="190" cy="166" r="7" fill="#E8483C"/>
      <circle cx="210" cy="166" r="7" fill="#E8483C"/>
      <path d="M185 215 L150 180 L120 140" stroke="#0B3D3A" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M215 215 L250 180 L280 140" stroke="#0B3D3A" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M170 230 L110 280 L60 340" stroke="#0B3D3A" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M230 230 L290 280 L340 340" stroke="#0B3D3A" stroke-width="6" stroke-linecap="round" fill="none"/>
    </g>
    <text x="0" y="92" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0B3D3A">Mosquito pica</text>
    <text x="0" y="109" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#666">y se infecta</text>
  </g>

  <g transform="translate(645,265)">
    <circle r="62" fill="#FFFFFF" stroke="#E8483C" stroke-width="2"/>
    <circle cx="0" cy="-16" r="15" fill="#E8483C"/>
    <path d="M-22 28 Q0 -4 22 28 Z" fill="#E8483C"/>
    <text x="0" y="86" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0B3D3A">Persona con</text>
    <text x="0" y="103" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0B3D3A">dengue</text>
  </g>

  <g transform="translate(400,422)">
    <circle r="62" fill="#FFFFFF" stroke="#E8483C" stroke-width="2"/>
    <g transform="translate(-30,-34) scale(0.155)">
      <ellipse cx="200" cy="215" rx="38" ry="48" fill="#E8483C"/>
      <path d="M178 250 Q200 320 222 250 Q222 220 200 215 Q178 220 178 250 Z" fill="#E8483C"/>
      <circle cx="200" cy="170" r="24" fill="#E8483C"/>
      <circle cx="190" cy="166" r="7" fill="#0B3D3A"/>
      <circle cx="210" cy="166" r="7" fill="#0B3D3A"/>
      <path d="M185 215 L150 180 L120 140" stroke="#E8483C" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M215 215 L250 180 L280 140" stroke="#E8483C" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M170 230 L110 280 L60 340" stroke="#E8483C" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M230 230 L290 280 L340 340" stroke="#E8483C" stroke-width="6" stroke-linecap="round" fill="none"/>
    </g>
    <text x="0" y="-78" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0B3D3A">Pica de nuevo</text>
    <text x="0" y="92" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#666">y transmite el virus</text>
  </g>

  <text x="400" y="248" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" font-weight="600" fill="#999" letter-spacing="0.04em">EL MOSQUITO NO NACE</text>
  <text x="400" y="265" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" font-weight="600" fill="#999" letter-spacing="0.04em">INFECTADO: SE INFECTA</text>
  <text x="400" y="282" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" font-weight="600" fill="#999" letter-spacing="0.04em">AL PICAR A UN ENFERMO</text>
</svg>
