<svg viewBox="0 0 500 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ilustración de los cuatro pasos para eliminar criaderos del mosquito: lavar, tapar, voltear y tirar">
  <rect x="0" y="0" width="500" height="360" rx="20" fill="#FFFFFF"/>

  <!-- LAVAR -->
  <g transform="translate(60,60)">
    <rect x="-35" y="-10" width="70" height="55" rx="6" fill="#2D7A6E" opacity="0.15"/>
    <path d="M-30 0 L30 0 L24 45 L-24 45 Z" fill="none" stroke="#0B3D3A" stroke-width="4" stroke-linejoin="round"/>
    <path d="M-30 0 Q0 -16 30 0" fill="none" stroke="#0B3D3A" stroke-width="4"/>
    <circle cx="-8" cy="20" r="2.5" fill="#2D7A6E"/>
    <circle cx="8" cy="26" r="2.5" fill="#2D7A6E"/>
    <circle cx="0" cy="34" r="2.5" fill="#2D7A6E"/>
    <text x="0" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="800" fill="#0B3D3A">LAVAR</text>
    <text x="0" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#555">Tinacos y piletas</text>
    <text x="0" y="111" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#555">cada semana</text>
  </g>

  <!-- TAPAR -->
  <g transform="translate(190,60)">
    <ellipse cx="0" cy="35" rx="32" ry="10" fill="none" stroke="#0B3D3A" stroke-width="4"/>
    <path d="M-32 35 L-32 0 Q-32 -10 0 -10 Q32 -10 32 0 L32 35" fill="none" stroke="#0B3D3A" stroke-width="4"/>
    <ellipse cx="0" cy="-10" rx="32" ry="9" fill="#E8483C" opacity="0.85"/>
    <text x="0" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="800" fill="#0B3D3A">TAPAR</text>
    <text x="0" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#555">Recipientes con</text>
    <text x="0" y="111" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#555">agua almacenada</text>
  </g>

  <!-- VOLTEAR -->
  <g transform="translate(320,60)">
    <g transform="rotate(180)">
      <path d="M-22 -25 L22 -25 L16 20 L-16 20 Z" fill="none" stroke="#0B3D3A" stroke-width="4" stroke-linejoin="round"/>
    </g>
    <path d="M-15 -5 A 20 20 0 1 1 18 -12" fill="none" stroke="#E8483C" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M14 -20 L18 -12 L26 -15" fill="none" stroke="#E8483C" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="800" fill="#0B3D3A">VOLTEAR</text>
    <text x="0" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#555">Cubetas y botes</text>
    <text x="0" y="111" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#555">que no se usan</text>
  </g>

  <!-- TIRAR -->
  <g transform="translate(440,60)">
    <path d="M-22 -10 L22 -10 L18 35 Q18 40 0 40 Q-18 40 -18 35 Z" fill="none" stroke="#0B3D3A" stroke-width="4" stroke-linejoin="round"/>
    <path d="M-26 -10 L26 -10" stroke="#0B3D3A" stroke-width="4" stroke-linecap="round"/>
    <path d="M-8 -10 L-6 -18 Q-6 -22 0 -22 Q6 -22 6 -18 L8 -10" fill="none" stroke="#0B3D3A" stroke-width="4"/>
    <text x="0" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="800" fill="#0B3D3A">TIRAR</text>
    <text x="0" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#555">Llantas, latas y</text>
    <text x="0" y="111" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#555">basura inservible</text>
  </g>

  <!-- Línea divisoria -->
  <line x1="30" y1="170" x2="470" y2="170" stroke="#0B3D3A" stroke-width="1" opacity="0.12"/>

  <!-- Mensaje inferior -->
  <text x="250" y="210" text-anchor="middle" font-family="Fraunces, serif" font-size="19" font-weight="600" fill="#0B3D3A">El Aedes aegypti nace en agua limpia</text>
  <text x="250" y="234" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#555">acumulada, no en agua sucia. Revisa tu casa una vez</text>
  <text x="250" y="254" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#555">por semana: macetas, botellas, llantas y canaletas.</text>

  <!-- Mini gota decorativa -->
  <g transform="translate(250,290)" opacity="0.18">
    <path d="M0 -22 C 14 -2, 14 14, 0 22 C -14 14, -14 -2, 0 -22 Z" fill="#2D7A6E"/>
  </g>
</svg>
