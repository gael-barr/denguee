<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mapa mental del dengue con sus ramas principales: agente causal, transmisión, clasificación clínica, prevención y notificación">
  <defs>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4"><circle cx="4" cy="4" r="3" fill="#0B3D3A"/></marker>
  </defs>

  <!-- Nodo central -->
  <g transform="translate(500,350)">
    <ellipse rx="100" ry="58" fill="#0B3D3A"/>
    <text x="0" y="-4" text-anchor="middle" font-family="Fraunces, serif" font-size="26" font-weight="700" fill="#F2E8D5">DENGUE</text>
    <text x="0" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#F2E8D5" opacity="0.85">Enfermedad viral</text>
  </g>

  <!-- Rama 1: Agente causal (arriba izquierda) -->
  <path d="M 430 310 Q 320 220 200 150" fill="none" stroke="#2D7A6E" stroke-width="2.5"/>
  <g transform="translate(170,120)">
    <rect x="-95" y="-30" width="190" height="60" rx="14" fill="#FFFFFF" stroke="#2D7A6E" stroke-width="2"/>
    <text x="0" y="-9" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#0B3D3A">AGENTE CAUSAL</text>
    <text x="0" y="9" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#444">Virus DENV (Flavivirus)</text>
    <text x="0" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#444">4 serotipos: DENV 1-4</text>
  </g>

  <!-- Rama 2: Transmisión (arriba derecha) -->
  <path d="M 570 310 Q 680 220 800 150" fill="none" stroke="#E8483C" stroke-width="2.5"/>
  <g transform="translate(830,120)">
    <rect x="-100" y="-30" width="200" height="60" rx="14" fill="#FFFFFF" stroke="#E8483C" stroke-width="2"/>
    <text x="0" y="-9" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#0B3D3A">TRANSMISIÓN</text>
    <text x="0" y="9" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#444">Picadura del mosquito</text>
    <text x="0" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#444">Aedes aegypti (diurno)</text>
  </g>

  <!-- Rama 3: Clasificación clínica (derecha) -->
  <path d="M 595 370 Q 720 400 850 400" fill="none" stroke="#E8483C" stroke-width="2.5"/>
  <g transform="translate(885,400)">
    <rect x="-105" y="-46" width="210" height="92" rx="14" fill="#FFFFFF" stroke="#E8483C" stroke-width="2"/>
    <text x="0" y="-25" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#0B3D3A">CLASIFICACIÓN OMS</text>
    <text x="0" y="-7" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#444">• Sin signos de alarma</text>
    <text x="0" y="9" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#444">• Con signos de alarma</text>
    <text x="0" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#444">• Dengue grave</text>
  </g>

  <!-- Rama 4: Prevención (abajo derecha) -->
  <path d="M 560 405 Q 680 500 800 560" fill="none" stroke="#2D7A6E" stroke-width="2.5"/>
  <g transform="translate(830,590)">
    <rect x="-100" y="-30" width="200" height="60" rx="14" fill="#FFFFFF" stroke="#2D7A6E" stroke-width="2"/>
    <text x="0" y="-9" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#0B3D3A">PREVENCIÓN</text>
    <text x="0" y="9" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#444">Lavar, tapar, voltear, tirar</text>
    <text x="0" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#444">y descacharrización</text>
  </g>

  <!-- Rama 5: Tratamiento (abajo) -->
  <path d="M 480 408 Q 460 480 440 545" fill="none" stroke="#0B3D3A" stroke-width="2.5"/>
  <g transform="translate(420,590)">
    <rect x="-105" y="-30" width="210" height="60" rx="14" fill="#FFFFFF" stroke="#0B3D3A" stroke-width="2"/>
    <text x="0" y="-9" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#0B3D3A">MANEJO CLÍNICO</text>
    <text x="0" y="9" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#444">Hidratación oral, paracetamol</text>
    <text x="0" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#444">(nunca aspirina/AINEs)</text>
  </g>

  <!-- Rama 6: Vigilancia / NOM (abajo izquierda) -->
  <path d="M 430 400 Q 320 480 200 555" fill="none" stroke="#2D7A6E" stroke-width="2.5"/>
  <g transform="translate(170,590)">
    <rect x="-100" y="-30" width="200" height="60" rx="14" fill="#FFFFFF" stroke="#2D7A6E" stroke-width="2"/>
    <text x="0" y="-9" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#0B3D3A">VIGILANCIA</text>
    <text x="0" y="9" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#444">NOM-032-SSA2-2014</text>
    <text x="0" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#444">Notificación obligatoria</text>
  </g>

  <!-- Rama 7: Síntomas iniciales (izquierda) -->
  <path d="M 405 370 Q 280 400 150 400" fill="none" stroke="#E8483C" stroke-width="2.5"/>
  <g transform="translate(115,400)">
    <rect x="-105" y="-46" width="210" height="92" rx="14" fill="#FFFFFF" stroke="#E8483C" stroke-width="2"/>
    <text x="0" y="-25" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#0B3D3A">SÍNTOMAS</text>
    <text x="0" y="-7" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#444">• Fiebre alta súbita</text>
    <text x="0" y="9" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#444">• Dolor muscular/articular</text>
    <text x="0" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#444">• Dolor retroocular, rash</text>
  </g>
</svg>
